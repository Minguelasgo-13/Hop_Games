<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival 2D - Versión Fluida</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }
        canvas {
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            background-color: #1a1a1a;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- CONFIGURACIÓN Y VARIABLES DEL JUEGO ---
const jugador = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    radio: 15,
    velocidad: 4,
    vida: 100,
    vidaMaxima: 100,
    exp: 0,
    expSiguiente: 100,
    nivel: 1
};

let enemigos = [];
let proyectiles = [];
let gemas = [];
let particulas = [];
let textosFlotantes = [];

let teclas = {};
let temporizadorDisparo = 0;
let intervaloDisparo = 30; // Cuanto menor sea, más rápido dispara
let tiempoJuego = 0;
let shakeTiempo = 0;

// --- CONTROLES ---
window.addEventListener("keydown", (e) => teclas[e.key.toLowerCase()] = true);
window.addEventListener("keyup", (e) => teclas[e.key.toLowerCase()] = false);

// --- FUNCIONES DE SOPORTE ---
function generarParticulas(x, y, color) {
    for (let i = 0; i < 8; i++) { // Cantidad optimizada para evitar lag
        particulas.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            vida: 20,
            color: color
        });
    }
}

function crearTexto(x, y, texto, color) {
    textosFlotantes.push({ x, y, texto, color, vida: 30 });
}

// --- BUCLE PRINCIPAL DEL JUEGO ---
function actualizar() {
    tiempoJuego++;

    // 1. Efecto Screen Shake (Vibración de pantalla)
    ctx.save();
    if (shakeTiempo > 0) {
        let dx = (Math.random() - 0.5) * 8;
        let dy = (Math.random() - 0.5) * 8;
        ctx.translate(dx, dy);
        shakeTiempo--;
    }

    // Limpiar pantalla
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Fondo cuadriculado simple para dar sensación de movimiento
    ctx.strokeStyle = "#222";
    ctx.lineWidth = 1;
    for (let x = 0; x < canvas.width; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }

    if (jugador.vida > 0) {
        // 2. Movimiento del Jugador
        if (teclas['w'] || teclas['arrowup']) jugador.y = Math.max(jugador.radio, jugador.y - jugador.velocidad);
        if (teclas['s'] || teclas['arrowdown']) jugador.y = Math.min(canvas.height - jugador.radio, jugador.y + jugador.velocidad);
        if (teclas['a'] || teclas['arrowleft']) jugador.x = Math.max(jugador.radio, jugador.x - jugador.velocidad);
        if (teclas['d'] || teclas['arrowright']) jugador.x = Math.min(canvas.width - jugador.radio, jugador.x + jugador.velocidad);

        // 3. Sistema de Disparo Automático (Busca al enemigo más cercano)
        temporizadorDisparo++;
        if (temporizadorDisparo >= intervaloDisparo && enemigos.length > 0) {
            let cercano = enemigos[0];
            let distMin = Math.hypot(cercano.x - jugador.x, cercano.y - jugador.y);
            
            for (let i = 1; i < enemigos.length; i++) {
                let d = Math.hypot(enemigos[i].x - jugador.x, enemies = enemigos[i].y - jugador.y);
                if (d < distMin) { distMin = d; cercano = enemigos[i]; }
            }

            let angulo = Math.atan2(cercano.y - jugador.y, cercano.x - jugador.x);
            proyectiles.push({
                x: jugador.x,
                y: jugador.y,
                vx: Math.cos(angulo) * 7,
                vy: Math.sin(angulo) * 7
            });
            temporizadorDisparo = 0;
        }

        // 4. Generación constante de enemigos comunes (Oleadas progresivas, SIN JEFES)
        // Controlamos el límite máximo de enemigos concurrentes (máx 40) para evitar lag
        if (tiempoJuego % 45 === 0 && enemigos.length < 40) {
            let ang = Math.random() * Math.PI * 2;
            enemigos.push({
                x: jugador.x + Math.cos(ang) * 500,
                y: jugador.y + Math.sin(ang) * 500,
                radio: 10 + Math.random() * 5,
                velocidad: 1.5 + Math.random() * 1,
                vida: 2 + Math.floor(jugador.nivel * 0.5)
            });
        }
    }

    // 5. Actualizar Proyectiles
    for (let i = proyectiles.length - 1; i >= 0; i--) {
        let p = proyectiles[i];
        p.x += p.vx;
        p.y += p.vy;

        // Dibujar bala
        ctx.fillStyle = "#fff000";
        ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill();

        // Borrar si sale de pantalla
        if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
            proyectiles.splice(i, 1);
            continue;
        }

        // Colisión Bala vs Enemigo
        for (let j = enemigos.length - 1; j >= 0; j--) {
            let e = enemigos[j];
            if (Math.hypot(e.x - p.x, e.y - p.y) < e.radio + 4) {
                e.vida--;
                proyectiles.splice(i, 1);
                
                if (e.vida <= 0) {
                    generarParticulas(e.x, e.y, "#ff4444");
                    gemas.push({ x: e.x, y: e.y, valor: 15 });
                    crearTexto(e.x, e.y, "+15 XP", "#00ffff");
                    enemigos.splice(j, 1);
                } else {
                    generarParticulas(e.x, e.y, "#ffffff");
                }
                break;
            }
        }
    }

    // 6. Actualizar Enemigos
    for (let i = enemigos.length - 1; i >= 0; i--) {
        let e = enemigos[i];
        let angulo = Math.atan2(jugador.y - e.y, jugador.x - e.x);
        e.x += Math.cos(angulo) * e.velocidad;
        e.y += Math.sin(angulo) * e.velocidad;

        // Dibujar enemigo
        ctx.fillStyle = "#ff4444";
        ctx.beginPath(); ctx.arc(e.x, e.y, e.radio, 0, Math.PI * 2); ctx.fill();

        // Colisión Enemigo vs Jugador
        if (jugador.vida > 0 && Math.hypot(jugador.x - e.x, jugador.y - e.y) < jugador.radio + e.radio) {
            jugador.vida -= 0.5; // Daño continuo por contacto
            shakeTiempo = 5;
            if (tiempoJuego % 30 === 0) crearTexto(jugador.x, jugador.y, "-10", "#ff0000");
        }
    }

    // 7. Actualizar Gemas de Experiencia
    for (let i = gemas.length - 1; i >= 0; i--) {
        let g = gemas[i];
        
        // Dibujar gema
        ctx.fillStyle = "#00ffff";
        ctx.beginPath(); ctx.arc(g.x, g.y, 5, 0, Math.PI * 2); ctx.fill();

        // Imán de gemas si están cerca del jugador
        let d = Math.hypot(jugador.x - g.x, jugador.y - g.y);
        if (d < 100) {
            let ang = Math.atan2(jugador.y - g.y, jugador.x - g.x);
            g.x += Math.cos(ang) * 5;
            g.y += Math.sin(ang) * 5;
        }

        if (d < jugador.radio + 5) {
            jugador.exp += g.valor;
            gemas.splice(i, 1);

            // Subir de nivel
            if (jugador.exp >= jugador.expSiguiente) {
                jugador.nivel++;
                jugador.exp = 0;
                jugador.expSiguiente = Math.floor(jugador.expSiguiente * 1.5);
                jugador.vida = jugador.vidaMaxima; // Curar al subir nivel
                intervaloDisparo = Math.max(10, intervaloDisparo - 2); // Dispara más rápido
                crearTexto(jugador.x, jugador.y - 20, "¡LEVEL UP!", "#ffff00");
            }
        }
    }

    // 8. Actualizar Partículas
    for (let i = particulas.length - 1; i >= 0; i--) {
        let p = particulas[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vida--;
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.vida / 20;
        ctx.fillRect(p.x, p.y, 3, 3);
        ctx.globalAlpha = 1.0;
        if (p.vida <= 0) particulas.splice(i, 1);
    }

    // 9. Actualizar Textos Flotantes
    for (let i = textosFlotantes.length - 1; i >= 0; i--) {
        let t = textosFlotantes[i];
        t.y -= 1;
        t.vida--;
        ctx.fillStyle = t.color;
        ctx.font = "bold 14px sans-serif";
        ctx.fillText(t.texto, t.x, t.y);
        if (t.vida <= 0) textosFlotantes.splice(i, 1);
    }

    // 10. Dibujar Jugador
    if (jugador.vida > 0) {
        ctx.fillStyle = "#3498db";
        ctx.beginPath(); ctx.arc(jugador.x, jugador.y, jugador.radio, 0, Math.PI * 2); ctx.fill();
    } else {
        ctx.fillStyle = "#aaa";
        ctx.font = "bold 40px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);
    }

    ctx.restore(); // Restaurar el estado del canvas tras el shake

    // INTERFAZ DE USUARIO (HUD) - No le afecta el shake
    // Barra de Vida
    ctx.fillStyle = "#555"; ctx.fillRect(20, 20, 200, 15);
    ctx.fillStyle = "#e74c3c"; ctx.fillRect(20, 20, Math.max(0, (jugador.vida / jugador.vidaMaxima) * 200), 15);
    
    // Barra de EXP
    ctx.fillStyle = "#555"; ctx.fillRect(20, 45, 200, 8);
    ctx.fillStyle = "#00ffff"; ctx.fillRect(20, 45, (jugador.exp / jugador.expSiguiente) * 200, 8);

    // Texto de Nivel
    ctx.fillStyle = "#fff";
    ctx.font = "14px sans-serif";
    ctx.textAlign = "left";
    ctx.fillText(`Nivel: ${jugador.nivel}`, 230, 32);

    requestAnimationFrame(actualizar);
}

// Iniciar el bucle
actualizar();
</script>

</body>
</html>
